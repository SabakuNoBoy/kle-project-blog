version: '3.8'

services:
  database:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-kledb}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_USER: ${DB_USERNAME:-kleuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql

  backend:
    build:
      context: ./kle-project-backend-main
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - database
    environment:
      DB_CONNECTION: mysql
      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-kledb}
      DB_USERNAME: ${DB_USERNAME:-kleuser}
      DB_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - ./kle-project-backend-main:/var/www/html
    command: sh -c "composer install --no-interaction && php -d upload_max_filesize=128M -d post_max_size=128M -d memory_limit=512M -d max_execution_time=600 artisan serve --host=0.0.0.0 --port=8000"

  frontend:
    build:
      context: ./kle-project-frontend-main
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    depends_on:
      - backend
    environment:
      API_URL: http://backend:8000/api
    volumes:
      - ./kle-project-frontend-main:/var/www/html
    command: sh -c "composer install --no-interaction && php artisan serve --host=0.0.0.0 --port=8000"

volumes:
  db-data:
